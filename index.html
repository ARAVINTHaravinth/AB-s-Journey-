<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story ❤️</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Music Button -->
<button id="musicBtn" onclick="toggleMusic()">
    🎵 Play Music
</button>

<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="slideshow">

    <div class="slide">
        <img src="photo1.jpg">
    </div>

    <div class="slide">
        <img src="photo2.jpg">
    </div>

    <div class="slide">
        <img src="photo3.jpg">
    </div>

    <div class="slide">
        <img src="photo4.jpg">
    </div>

    <div class="slide">
        <img src="photo5.jpg">
    </div>

    <div class="slide">
        <img src="photo6.jpg">
    </div>

    <div class="slide">
        <img src="photo7.jpg">
    </div>

</div>

<div class="overlay">

    <h1>❤️ Our Story ❤️</h1>

    <p>
        Every memory tells a story.<br>
        Every story holds a feeling.<br><br>

        Through every smile,
        every laugh,
        every moment shared...<br><br>

        one thing has remained constant ❤️
    </p>

    <div class="forever">
        ♾️ Made For Each Other ♾️
    </div>

</div>

<script>

const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

function toggleMusic() {

    if (music.paused) {

        music.play();

        btn.innerHTML = "⏸ Pause Music";

    } else {

        music.pause();

        btn.innerHTML = "🎵 Play Music";
    }
}

</script>

</body>
</html>
