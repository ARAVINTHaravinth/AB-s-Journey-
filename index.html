<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div id="intro">
    ❤️ A Beautiful Story ❤️
</div>

<div id="mainContent">

    <div class="slideshow">

        <div class="slide"><img src="photo1.jpg"></div>
        <div class="slide"><img src="photo2.jpg"></div>
        <div class="slide"><img src="photo3.jpg"></div>
        <div class="slide"><img src="photo4.jpg"></div>
        <div class="slide"><img src="photo5.jpg"></div>
        <div class="slide"><img src="photo6.jpg"></div>
        <div class="slide"><img src="photo7.jpg"></div>

    </div>

    <div class="overlay">

        <h1>❤️ Our Story ❤️</h1>

        <p>
            Every memory tells a story.<br>
            Every story holds a feeling.<br><br>

            Through every smile,<br>
            every laugh,<br>
            every moment shared...<br><br>

            one thing has remained constant ❤️
        </p>

        <div class="forever">
            ♾️ We Were Meant For Each Other ♾️
        </div>

    </div>

</div>

<script>

window.onload = function() {

    setTimeout(function(){

        document.getElementById("intro").style.display = "none";

        document.getElementById("mainContent").style.display = "block";

        const music = document.getElementById("bgMusic");

        music.play().catch(() => {
            console.log("Autoplay blocked by browser");
        });

    }, 2000);

};

</script>

</body>
</html>
