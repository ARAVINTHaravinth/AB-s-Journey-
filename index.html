<body>

<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- Welcome Screen -->
<div id="startScreen">

    <h1>❤️ Our Story ❤️</h1>

    <p>
        Every memory has a story...<br>
        Every story has a reason...
    </p>

    <button onclick="startExperience()">
        Begin Our Story ❤️
    </button>

</div>

<!-- Main Content -->
<div id="mainContent" style="display:none;">

    <div class="slideshow">

        <div class="slide"><img src="photo1.jpg"></div>
        <div class="slide"><img src="photo2.jpg"></div>
        <div class="slide"><img src="photo3.jpg"></div>
        <div class="slide"><img src="photo4.jpg"></div>
        <div class="slide"><img src="photo5.jpg"></div>
        <div class="slide"><img src="photo6.jpg"></div>
        <div class="slide"><img src="photo7.jpg"></div>

    </div>

    <div class="overlay">

        <h1>❤️ Our Story ❤️</h1>

        <p>
            Every memory tells a story.<br>
            Every story holds a feeling.<br><br>

            Through every smile,<br>
            every laugh,<br>
            every moment shared...<br><br>

            one thing has remained constant ❤️
        </p>

        <div class="forever">
            ♾️ We Were Meant For Each Other ♾️
        </div>

    </div>

</div>

<script>

function startExperience() {

    document.getElementById("startScreen").style.display = "none";

    document.getElementById("mainContent").style.display = "block";

    document.getElementById("bgMusic").play();

}

</script>

</body>
